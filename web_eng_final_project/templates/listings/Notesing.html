{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8">
        <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-primary text-white rounded-top-4 py-3">
                <h4 class="mb-0 fw-bold">📝 Post a New To-Let</h4>
            </div>
            <div class="card-body p-4 bg-light">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 fw-bold py-2 mt-3 fs-5">
                        Publish Advertisement
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
