<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | To-Let BD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #003d99 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        input {
            display: block !important;
            width: 100% !important;
            padding: 12px !important;
            margin-bottom: 15px !important;
            border: 1px solid #ddd !important;
            border-radius: 10px !important;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #444;
            margin-bottom: 5px;
            display: block;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #0d6efd;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .footer-text a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: bold;
        }
        /* Alert message styling */
        .messages {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }
        .alert {
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <h1 style="font-size: 40px; margin: 0;">🏠</h1>
            <h2 class="fw-bold mt-2">Login</h2>
            <p class="text-muted small">Welcome back to To-Let BD</p>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-success{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div>
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>
            <div>
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">Login Now</button>
        </form>

        <div class="footer-text">
            Don't have an account? <a href="{% url 'signup' %}">Sign up here</a>
        </div>
        <div class="text-center mt-3">
            <a href="{% url 'home' %}" style="text-decoration: none; font-size: 0.8rem; color: #aaa;">← Back to Home</a>
        </div>
    </div>

</body>
</html>
